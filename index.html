<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programação Cupola Summit 2026</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="summit-schedule">
      <div class="schedule-controls">
        <p class="schedule-instruction">
          Clique nos dias abaixo para mudar a programação
        </p>

        <div class="schedule-tabs" id="tabs-container">
          <!-- Tabs serão geradas dinamicamente -->
        </div>

        <div class="schedule-legend-container">
          <span class="legend-label">TEMAS:</span>

          <div class="schedule-legend">
            <span class="legend-item incorp">INCORPORAÇÃO</span>
            <span class="legend-item vendas">VENDAS</span>
            <span class="legend-item emp">EMPREENDEDORISMO</span>
            <span class="legend-item aluguel">ALUGUEL</span>
            <span class="legend-item solucoes">SOLUÇÕES</span>
          </div>
        </div>
      </div>

      <div id="schedule-content">
        <!-- Conteúdo será gerado dinamicamente -->
      </div>
    </div>

    <div id="experiencias"></div>

    <script src="script.js"></script>

    <script>
      fetch("./experiencias.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("experiencias").innerHTML = data;
        });
    </script>

    <!-- AUTO HEIGHT IFRAME -->
    <script>
      function sendHeight() {
        const height = document.documentElement.scrollHeight;

        window.parent.postMessage(
          {
            type: "setHeight",
            height,
          },
          "*",
        );
      }

      window.addEventListener("load", sendHeight);
      window.addEventListener("resize", sendHeight);

      setInterval(sendHeight, 1000);
    </script>
  </body>
</html>
